      operationId: member_points_log_list
      summary: List point earn and redeem history for a member
      tags: [Membership]
      parameters:
        - $ref: "#/components/parameters/SelectParam"
        - $ref: "#/components/parameters/OrderParam"
        - $ref: "#/components/parameters/RangeHeader"
        - name: member_id
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          example: "eq.earn"
      responses:
        "200":
          description: Array of points log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberPointsLog"

  # ===========================================================================
  # REST API  /rest/v1/rpc/  — Custom PostgreSQL Functions
  # ===========================================================================

  /rest/v1/rpc/decrement_stock:
    post:
      operationId: rpc_decrement_stock
      summary: Atomically decrement product stock at a branch
      description: |
        Called during POS checkout for each sale item. Handles stock
        deduction and writes a stock_log entry in one atomic DB operation.
        SECURITY DEFINER — executes as function owner.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_product_id, p_branch_id, p_quantity, p_sale_id]
              properties:
                p_product_id:
                  type: string
                  format: uuid
                p_branch_id:
                  type: string
                  format: uuid
                p_quantity:
                  type: number
                p_sale_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Stock decremented, returns new quantity
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_quantity:
                    type: number

  /rest/v1/rpc/receive_po_item:
    post:
      operationId: rpc_receive_po_item
      summary: Receive items from a purchase order into stock
      description: |
        Marks quantity_received on the PO item, increments product_stock,
        writes a stock_log entry, and sets the PO status to received
        when all items are fully received.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_item_id, p_qty_received, p_stock_qty, p_user_id]
              properties:
                p_item_id:
                  type: string
                  format: uuid
                  description: purchase_order_items.id
                p_qty_received:
                  type: number
                  description: Quantity in PO units
                p_stock_qty:
                  type: number
                  description: Quantity in stock units (= p_qty_received x po_conversion)
                p_user_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: PO item received and stock updated

  /rest/v1/rpc/send_stock_transfer:
    post:
      operationId: rpc_send_stock_transfer
      summary: Initiate a stock transfer from source branch
      description: Sets transfer status to in_transit and deducts stock at from_branch_id.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_transfer_id]
              properties:
                p_transfer_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Transfer initiated

  /rest/v1/rpc/receive_stock_transfer:
    post:
      operationId: rpc_receive_stock_transfer
      summary: Receive a stock transfer at destination branch
      description: Sets transfer status to received and increments stock at to_branch_id.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_transfer_id]
              properties:
                p_transfer_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Transfer received and stock updated

  /rest/v1/rpc/cancel_stock_transfer:
    post:
      operationId: rpc_cancel_stock_transfer
      summary: Cancel a stock transfer
      description: Sets transfer status to cancelled. Restores source stock if the transfer was already in_transit.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_transfer_id]
              properties:
                p_transfer_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Transfer cancelled

  /rest/v1/rpc/next_sku_for_category:
    post:
      operationId: rpc_next_sku_for_category
      summary: Generate next sequential SKU for a category
      description: Uses the category sku_prefix and an auto-incrementing counter e.g. DRK-0042.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_category_id]
              properties:
                p_category_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Generated SKU string
          content:
            application/json:
              schema:
                type: string
                example: "DRK-0042"

  /rest/v1/rpc/next_invoice_no:
    post:
      operationId: rpc_next_invoice_no
      summary: Generate next sequential invoice number
      description: |
        Platform admin only. Format is {prefix}{year}-{seq} e.g. INV2026-0001.
        Atomically increments the invoice_seq in platform_settings.
      tags: [RPC]
      security:
        - ApiKeyAuth: []
          ServiceRoleAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Generated invoice number
          content:
            application/json:
              schema:
                type: string
                example: "INV2026-0001"

  /rest/v1/rpc/next_member_no:
    post:
      operationId: rpc_next_member_no
      summary: Generate next sequential member number for a company
      description: Format is M{5-digit-seq} e.g. M00042. Atomically incremented per company.
      tags: [RPC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_company_id]
              properties:
                p_company_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Generated member number
          content:
            application/json:
              schema:
                type: string
                example: "M00042"

  /rest/v1/rpc/run_subscription_tick:
    post:
      operationId: rpc_run_subscription_tick
      summary: Process subscription status transitions (cron job)
      description: |
        Checks all subscriptions against current_period_end and due_date.
        Moves overdue subscriptions to past_due and suspends after threshold.
        Triggered by Supabase pg_cron — not called from application code.
      tags: [RPC]
      security:
        - ApiKeyAuth: []
          ServiceRoleAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Subscription statuses updated

