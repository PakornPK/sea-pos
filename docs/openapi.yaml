  # ── POS / Sales ───────────────────────────────────────────────
  /rest/v1/sales:
    post:
      operationId: sales_create
      summary: Create sale
      description: Creates a completed sale header. Call `POST /rest/v1/sale_items` separately for line items.
      tags: [POS]
      parameters:
        - $ref: "#/components/parameters/PreferReturn"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, branch_id, total_amount, subtotal_ex_vat, vat_amount, payment_method]
              properties:
                user_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                  nullable: true
                member_id:
                  type: string
                  format: uuid
                  nullable: true
                branch_id:
                  type: string
                  format: uuid
                total_amount:
                  type: number
                subtotal_ex_vat:
                  type: number
                vat_amount:
                  type: number
                member_discount_baht:
                  type: number
                  default: 0
                redeem_points_used:
                  type: number
                  default: 0
                payment_method:
                  type: string
                  enum: [cash, card, transfer]
                status:
                  type: string
                  enum: [completed]
                  default: completed
      responses:
        "201":
          description: Sale created — returns the new sale row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
    get:
      operationId: sales_list
      summary: List sales
      description: |
        Embed items: `?select=*,items:sale_items(*,options:sale_item_options(*))`.
        Embed customer: `?select=*,customer:customers(name,phone)`.
      tags: [POS]
      parameters:
        - $ref: "#/components/parameters/SelectParam"
        - $ref: "#/components/parameters/OrderParam"
        - $ref: "#/components/parameters/RangeHeader"
        - name: status
          in: query
          schema:
            type: string
          example: "eq.completed"
        - name: branch_id
          in: query
          schema:
            type: string
        - name: customer_id
          in: query
          schema:
            type: string
        - name: payment_method
          in: query
          schema:
            type: string
          example: "eq.cash"
        - name: created_at
          in: query
          schema:
            type: string
          example: "gte.2026-04-01T00:00:00Z"
      responses:
        "200":
          description: Array of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"

  /rest/v1/sale_items:
    post:
      operationId: sale_items_create
      summary: Create sale items
      description: Inserts one or more line items for a sale. Accepts a single object or an array.
      tags: [POS]
      parameters:
        - $ref: "#/components/parameters/PreferReturn"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SaleItemInsert"
                - type: array
                  items:
                    $ref: "#/components/schemas/SaleItemInsert"
      responses:
        "201":
          description: Sale item(s) created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleItem"
    get:
      operationId: sale_items_list
      summary: List items in a sale
      tags: [POS]
      parameters:
        - $ref: "#/components/parameters/SelectParam"
        - name: sale_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of sale items
